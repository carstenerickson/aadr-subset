name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test-py${{ matrix.python }}-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        os: ["ubuntu-latest", "macos-latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Type check
        run: mypy --strict src

      - name: Test (default suite; excludes slow + external_tool)
        run: pytest -m "not slow and not external_tool" --cov --cov-report=term-missing

      - name: Coverage gate
        run: coverage report --fail-under=90

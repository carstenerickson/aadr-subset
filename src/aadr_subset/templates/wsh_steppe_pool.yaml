# Western Steppe Herder (WSH) pool starter template.
#
# Verified against AADR v62.0 + v66.0. Uses Group_ID globs to collect
# all Yamnaya / Poltavka / Eneolithic-steppe variants — the suffix
# convention dropped at v66 + the site-prefix breakdown means an
# enumeration of literals would be brittle. Globs adapt across
# versions and capture the natural cohort.
tested_against: [v62.0, v66.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Classic distal-source pool for steppe ancestry: Yamnaya (Samara,
  Kalmykia, Caucasus, etc.), Poltavka, and the Eneolithic-steppe /
  Caucasus-Eneolithic groups that precede Yamnaya chronologically.
  The `any:` block lets each subgroup carry its own date window —
  Eneolithic is older than Yamnaya, so one universal range would
  either miss Eneolithic samples or stretch too late for tight Yamnaya
  filtering.

  Glob expansion behavior: `Russia_*EBA_Yamnaya*` matches both v62's
  suffix forms (Russia_Samara_EBA_Yamnaya.AG) and v66's bare /
  hyphenated forms (Russia_Samara_EBA_Yamnaya, Russia_Kalmykia_EBA_Yamnaya-1).
  v66 introduced `Russia_EBA_*_Yamnaya` (period before region); that's
  captured by the second glob in the same branch.

  Per HLD pin: globs hash *as written* — the signature is stable across
  AADR releases even though the resolved set differs. Use literals if
  you need a frozen cohort that exactly tracks a single .anno.
---
any:
  - populations:
      - "Russia_*EBA_Yamnaya*"     # v62 + v66 region-first form
      - "Russia_EBA_*_Yamnaya*"    # v66 period-first form (e.g. Russia_EBA_Caucasus_Yamnaya)
    date:
      min_calbp: 4500
      max_calbp: 5500
  - populations:
      - "Russia_*MBA_Poltavka*"    # v62 (Russia_MBA_Poltavka.AG) + v66 site-prefixed
    date:
      min_calbp: 4000
      max_calbp: 5000
  - populations:
      - "Russia_*Steppe_Eneolithic*"   # v62 (Russia_Steppe_Eneolithic.AG)
      - "Russia_*Eneolithic_Steppe*"   # v66 (Russia_Eneolithic_Steppe; period/region order flipped)
      - "Russia_Caucasus_Eneolithic*"  # v62 + v66 (mostly v62)
      - "Russia_Eneolithic_Caucasus*"  # v66 alternate form
    date:
      min_calbp: 5000
      max_calbp: 7000
min_coverage: 0.3

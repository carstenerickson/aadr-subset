# Bronze Age Europe starter template (~5000-2700 calBP).
#
# Verified against AADR v62.0. Labels follow the AADR convention
# `Country_(Period_)Culture.{AG|SG|DG}`; there is no pan-European
# `Bell_Beaker` or `Corded_Ware` label — they're broken out by
# country (Czechia, Germany, England, France, Poland, etc.).
tested_against: [v62.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Pan-European Bronze Age cohort spanning the canonical archaeological
  horizons (Bell Beaker, Corded Ware, Unetice, Yamnaya). Pulls from
  several countries so the cohort is broad enough for PCA / clustering
  context. For tight ancestry questions, narrow to one country per
  horizon (e.g. just `Germany_BellBeaker.AG` + `Germany_CordedWare.AG`).
---
date:
  min_calbp: 2700
  max_calbp: 5000
populations:
  - Czechia_BellBeaker.AG
  - England_BellBeaker.AG
  - England_EBA_BellBeaker.AG
  - France_BellBeaker.AG
  - Germany_BellBeaker.AG
  - Germany_CordedWare.AG
  - Czechia_EBA_CordedWare.AG
  - Estonia_CordedWare.AG
  - Latvia_LN_CordedWare.AG
  - Poland_CordedWare.SG
  - Czechia_EBA_Unetice.AG
  - Russia_Samara_EBA_Yamnaya.AG
  - Russia_Kalmykia_EBA_Yamnaya.SG
min_coverage: 0.3

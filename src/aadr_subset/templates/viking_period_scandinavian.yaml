# Viking-period Scandinavian + diaspora starter template
# (~1200-800 calBP / ~750-1150 CE).
#
# Verified against AADR v62.0 + v66.0. Uses per-country Group_ID globs
# (`Norway_Viking*`, `Sweden_Viking*`, etc.) which match the v62 `.SG`
# suffix forms (Margaryan et al. 2020 was shotgun-sequenced) and the
# v66 bare + `-N` outlier variants.
tested_against: [v62.0, v66.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Viking Age samples — Scandinavian homelands plus the diaspora
  destinations. v66 retained the country-level canonical Viking
  labels (`Norway_Viking`, `Sweden_Viking`, `Denmark_Viking`, etc.)
  but dropped some less-populated locales (Gotland, IsleOfMan,
  Faroes — globs still include them; they harmlessly match zero in
  v66).

  Pre-/Early-Viking transitional groups (`*_PreViking`,
  `*_EarlyViking`) aren't included. The two `any:` branches split
  homeland vs diaspora because diaspora samples sometimes carry
  slightly later median dates.
---
any:
  - populations:
      # Scandinavian homelands
      - "Norway_Viking*"
      - "Sweden_Viking*"
      - "Denmark_Viking*"
      - "Gotland_Viking*"        # v62 only
    date:
      min_calbp: 800
      max_calbp: 1300
  - populations:
      # Diaspora — Atlantic + Baltic + east
      - "Iceland_Viking*"
      - "England_Viking*"
      - "Ireland_Viking*"
      - "Scotland_Viking*"
      - "IsleOfMan_Viking*"      # v62 only
      - "Faroes_Viking*"         # v62 only
      - "Russia_Viking*"
      - "Poland_Viking*"
    date:
      min_calbp: 800
      max_calbp: 1300
min_coverage: 0.3

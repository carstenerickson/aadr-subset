# Viking-period Scandinavian + diaspora starter template
# (~1200-800 calBP / ~750-1150 CE).
#
# Verified against AADR v62.0. Labels follow
# `{Country}_Viking.SG` (Margaryan et al. 2020 Nature panel).
# EarlyViking and PreViking variants exist for some countries.
tested_against: [v62.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Viking Age samples — Scandinavian homelands plus the diaspora
  destinations (Iceland, England, Ireland, Scotland, Isle of Man,
  Faroes, Poland, Russia). AADR labels all carry `.SG` (Margaryan
  et al. 2020 was shotgun-sequenced).

  Pre-/Early-Viking transitional groups (Norway_North_Pre_Viking,
  Sweden_EarlyViking, Estonia_EarlyViking, etc.) are NOT included —
  add them in a second `any:` branch if you want the long transition
  window. The two branches below split homeland vs diaspora because
  diaspora samples sometimes carry slightly later median dates.
---
any:
  - populations:
      - Norway_Viking.SG
      - Sweden_Viking.SG
      - Denmark_Viking.SG
      - Gotland_Viking.SG
    date:
      min_calbp: 800
      max_calbp: 1300
  - populations:
      - Iceland_Viking.SG
      - England_Viking.SG
      - Ireland_Viking.SG
      - Scotland_Viking.SG
      - IsleOfMan_Viking.SG
      - Faroes_Viking.SG
      - Russia_Viking.SG
      - Poland_Viking.SG
    date:
      min_calbp: 800
      max_calbp: 1300
min_coverage: 0.3

# Iron Age Britain starter template (~2400-1900 calBP / ~450 BCE - 50 CE).
#
# Verified against AADR v62.0 + v66.0. v62 carries the `.AG` / `.SG`
# suffix; v66 dropped it. Uses a Group_ID glob (`England_IA.[AS]G`) to
# match both v62 suffix forms in one line, plus the bare v66 label.
tested_against: [v62.0, v66.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Pre-Roman Iron Age British cohort. The date window brackets the
  conventional British La Tène era (~450 BCE - 50 CE). Neither release
  carries `Scotland_IA` or `Wales_IA` — Scotland/Wales samples from the
  British Iron Age aren't sampled separately.

  To include Roman-era and Early Medieval samples, replace the literals
  below with `England_IA*` — that glob matches the same plus the Roman
  / EarlyMedieval / outlier variants. To drop outliers from the broader
  pattern, add `exclude:` with `group_ids: [England_IA-o*, "*_o.SG"]`.

  min_coverage: 0.3 against the native `coverage_1240k` column is
  conservative. On v62.0 (class D, no native coverage), pair with
  `--coverage-derive snps_hit_1240k`; the proxy at 0.3 ≈ 345k of 1.148M
  targets observed. On v66.0 the native column suffices.
---
populations:
  - England_IA           # v66
  - "England_IA.[AS]G"   # v62: matches England_IA.AG + England_IA.SG
date:
  min_calbp: 1900
  max_calbp: 2400
min_coverage: 0.3

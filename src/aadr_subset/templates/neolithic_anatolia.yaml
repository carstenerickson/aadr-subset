# Neolithic Anatolia starter template (~9500-7000 calBP).
#
# Verified against AADR v62.0. AADR labels these as
# `Turkey_{Region}_{Site}_N.{AG|SG|DG}`; there is no `Anatolia_N`
# top-level label.
tested_against: [v62.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Early Neolithic Anatolian farmers — proximal source for the EEF
  (Early European Farmer) component that spread westward starting
  ~8500 calBP. Useful as a qpAdm distal source. AADR breaks these out
  by site: Catalhoyuk + TepecikCiftlik in Central Anatolia; Barcin,
  Ilipinar (also spelled Illipinar in some rows), Kumtepe in the
  Marmara region. Barcin has `.SG`, `.AG`, and `.DG` variants — all
  are kept here so the cohort covers all three call sets.
---
populations:
  - Turkey_Marmara_Barcin_N.SG
  - Turkey_Marmara_Barcin_N.AG
  - Turkey_Marmara_Barcin_N.DG
  - Turkey_Marmara_Barcin_Hofmanova_N.SG
  - Turkey_Marmara_Ilipinar_N.AG
  - Turkey_Marmara_Illipinar_N.AG
  - Turkey_Marmara_Kumtepe_N.SG
  - Turkey_Central_Catalhoyuk_N.SG
  - Turkey_Central_TepecikCiftlik_N.WGC.SG
date:
  min_calbp: 7000
  max_calbp: 9500
min_coverage: 0.3

# Neolithic Anatolia starter template (~9500-7000 calBP).
#
# Verified against AADR v62.0 + v66.0. v62 carries
# `Turkey_{Region}_{Site}_N.{AG|SG|DG}` (Marmara region + Central
# Anatolia); v66 simplified to `Turkey_{Site}_{Period}` without the
# region prefix and dropped Barcin entirely from the HO panel.
# Globs capture both layouts.
tested_against: [v62.0, v66.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Early Neolithic Anatolian farmers — proximal source for the EEF
  (Early European Farmer) component that spread westward starting
  ~8500 calBP. Useful as a qpAdm distal source.

  Notable difference between releases: v66 HO dropped the Barcin
  / Marmara breakdown that v62 carries. v62 has Barcin (Marmara
  region) + Catalhoyuk + TepecikCiftlik + Ilipinar + Kumtepe;
  v66 HO has only Catalhoyuk plus a consolidated `Turkey_N`. The
  globs adapt automatically.
---
populations:
  # Catalhoyuk + period qualifiers (EN / MN / LN / N) across both versions
  - "Turkey_*Catalhoyuk_*N*"
  # Barcin (v62 only — dropped from v66 HO)
  - "Turkey_*Barcin*"
  # TepecikCiftlik + Ilipinar / Illipinar + Kumtepe (mostly v62)
  - "Turkey_*TepecikCiftlik*"
  - "Turkey_*Ilipinar*"
  - "Turkey_*Illipinar*"
  - "Turkey_*Kumtepe*"
  # v66 consolidated label
  - Turkey_N
date:
  min_calbp: 7000
  max_calbp: 9500
min_coverage: 0.3

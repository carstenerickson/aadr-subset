# Modern European populations starter template.
#
# Verified against AADR v62.0. `.DG` = Reich shotgun-coverage call set;
# `.HO` = HumanOrigins array genotypes. Modern samples in AADR
# overwhelmingly carry one of these two suffixes; .SG is rare for
# present-day individuals.
tested_against: [v62.0]
last_verified: '2026-05-12'
maintainer: aadr-subset
notes: |
  Modern (post-1880 CE) Europe-broad reference set, intersecting both
  the Reich shotgun-coverage (.DG) and HumanOrigins array (.HO) panels.
  `modern_only: true` is the shorthand for date_calbp <= 70 — keeps
  the filter explicit even though every label here is modern by
  definition.

  Notable absence: v62.0 has no top-level `Irish.HO`, `Swedish.HO`, or
  `German.HO` — those populations are present in the corpus only via
  ancient labels (e.g. `Sweden_Viking.SG`). For a Northern-European
  modern reference, use `Norwegian.HO` + `Finnish.HO` as proxies for
  Scandinavia and drop Sweden/Germany/Ireland from your list.
---
modern_only: true
populations:
  - English.DG
  - English.HO
  - French.DG
  - French.HO
  - Italian_North.DG
  - Italian_North.HO
  - Italian_South.HO
  - Spanish.DG
  - Spanish.HO
  - Norwegian.DG
  - Norwegian.HO
  - Finnish.DG
  - Finnish.HO
  - Greek.HO
  - Russian.DG
  - Russian.HO
